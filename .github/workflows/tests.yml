name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIPER_VOICE_FR: fr_FR-upmc-medium
  PIPER_VOICE_FR_URL: https://huggingface.co/rhasspy/piper-voices/resolve/main/fr/fr_FR/upmc/medium

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install espeak-ng (Piper phonemization)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends espeak-ng espeak-ng-data

      - name: Install Python test dependencies
        # Heavy ML deps (torch, faster-whisper, transformers, pyaudiowpatch) are
        # NOT installed in CI: the corresponding tests skip gracefully.
        # scipy + soundfile = WAV file mode tests.
        # piper-tts = real synthesis tests when the voice is cached/downloaded.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio numpy pyyaml scipy soundfile piper-tts

      - name: Cache Piper FR voice
        id: piper-fr-cache
        uses: actions/cache@v4
        with:
          path: models/piper
          # Bump the suffix to invalidate the cache when we change the voice.
          key: piper-voice-${{ env.PIPER_VOICE_FR }}-v1

      - name: Download Piper FR voice
        if: steps.piper-fr-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "models/piper/${PIPER_VOICE_FR}"
          curl -L --fail --silent --show-error \
            -o "models/piper/${PIPER_VOICE_FR}/${PIPER_VOICE_FR}.onnx" \
            "${PIPER_VOICE_FR_URL}/${PIPER_VOICE_FR}.onnx"
          curl -L --fail --silent --show-error \
            -o "models/piper/${PIPER_VOICE_FR}/${PIPER_VOICE_FR}.onnx.json" \
            "${PIPER_VOICE_FR_URL}/${PIPER_VOICE_FR}.onnx.json"

      - name: Run tests
        run: pytest tests/ -v

      - name: Generate SBOM (Python 3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pip install cyclonedx-bom
          python tools/generate_sbom.py --output sbom.json
          python tools/generate_sbom.py --output sbom.xml --format xml || true

      - name: Upload SBOM artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml
          if-no-files-found: warn
          retention-days: 90
