# Profil LOW RESOURCE
# Cible: GPU intégré ou ancien (<6GB VRAM)
# Latence attendue: ~1000ms

profile: low_resource
hardware_level: low

audio:
  sample_rate: 16000
  channels: 1
  chunk_size: 2048
  format: int16
  vad_threshold: 0.015
  silence_duration: 0.5
  input_device_pattern: ""
  output_device_pattern: ""
  vbcable_input_pattern: "CABLE Input"
  vbcable_output_pattern: "CABLE-B"

stt:
  model_size: small
  device: cuda
  compute_type: int8
  language: fr
  beam_size: 3
  vad_filter: true
  download_root: ./models/whisper

translation:
  model_name: facebook/nllb-200-distilled-600M
  device: cuda
  source_lang: fra_Latn
  target_lang: eng_Latn
  max_length: 256
  num_beams: 3
  cache_dir: ./models/nllb

tts:
  model_path: ./models/piper
  voice_fr: fr_FR-upmc-medium
  voice_en: en_US-lessac-medium
  sample_rate: 22050

vad:
  backend: silero
  threshold: 0.5
  rms_threshold: 0.02
  min_speech_duration: 0.1
  min_silence_duration: 0.5
  sample_rate: 16000

models_dir: ./models
logs_dir: ./logs
config_dir: ./config

verbose: false
log_level: INFO
enable_stats: true
